<!DOCTYPE html>
<html>
<head>
    <title>Avatar - AI Gallery</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./man.css"> 
    <style>
        /* إجبار الخلفية في هذه الصفحة على الالتجاء لليمين ليظهر الوجه كاملاً */
        .contaner {
            background-position: right center !important;
        }

        /* المحاذاة جهة اليسار لتترك مساحة للوجه في اليمين */
        .gallery-box {
            display: flex;
            flex-direction: column;
            width: 55%; 
            margin-top: 20px;
            padding: 20px 40px;
        }
        .gallery-box h2 {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 32px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .images-grid {
            display: flex;
            gap: 20px; 
            width: 100%;
        }
        .ai-card {
            flex: 1;
            height: 200px; 
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }
        .ai-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .ai-card:hover {
            transform: translateY(-5px);
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }
        .ai-card:hover img {
            transform: scale(1.1);
        }
        @media (max-width: 768px) {
            .gallery-box { width: 100%; padding: 20px; }
            .images-grid { flex-direction: column; gap: 20px; }
            .ai-card { height: 180px; width: 100%; }
            .gallery-box h2 { font-size: 26px; }
            .contaner { height: auto; padding-bottom: 30px; }
        }
    </style>
</head>
<body>
     <div class="contaner">
        <header>
            <a class="logo" href="index.html">avatar</a>
            <ul>
                <li><a href="index.html">home</a></li>
                <li><a href="clans.html">clans</a></li> 
                <li><a href="video.html" style="color: rgb(10, 218, 10);">video</a></li>
                <li><a href="phone.html">phone</a></li>
                <li><a href="about.html">about</a></li>
            </ul>
        </header>
        
        <div class="gallery-box">
            <h2>AI Pandora World</h2>
            <div class="images-grid">
                
                <div class="ai-card">
                    <img src="./pic1.jpg.jpg" alt="Pandora Nature">
                </div>
                
                <div class="ai-card">
                    <img src="./pic2.jpg.jpg" alt="Pandora Creature">
                </div>
                
                <div class="ai-card">
                    <img src="./pic3.jpg.jpg" alt="Avatar Character">
                </div>
                
            </div>
        </div>
     </div>
</body>
</html>
