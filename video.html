 <!DOCTYPE html>

    <style>
        .video-box {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 40px;
            align-items: center;
        }
        .video-box h2 {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 32px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .video-wrapper {
            width: 100%;
            position: relative;
            padding-bottom: 56.25%; /* أبعاد العرض 16:9 شاشات العرض */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        @media (max-width: 768px) {
            .video-box { padding: 0 20px; }
            .video-box h2 { font-size: 26px; }
            .contaner { height: auto; padding-bottom: 30px; }
        }
    </style>
</head>
