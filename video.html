<!DOCTYPE html>
<html>
<head>
    <title>Avatar - AI Gallery</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./man.css"> 
    <style>
        /* إجبار الخلفية الكبيرة على الظهور كاملة وبالحجم الطبيعي المريح */
        .contaner {
            width: 90%;
            height: auto !important;
            min-height: 550px;
            padding-bottom: 40px;
            background-position: center !important;
            background-size: cover !important;
        }

        /* نقل صندوق الكروت بالكامل لليسار وتصغير عرضه لإبراز صورة الأفاتار باليمين */
        .gallery-box {
            display: flex;
            flex-direction: column;
            width: 45%; /* تم تصغير العرض لترك مساحة ضخمة للأفاتار في اليمين */
            margin: 20px 0 0 0; /* إلغاء التوسط ونقله لليمنة تماماً */
            padding: 0 0 0 40px; /* مسافة أمان من حافة الكارت اليسرى */
            align-items: flex-start;
        }
        .gallery-box h2 {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 28px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: left;
        }
        /* شبكة الصور ممتدة ومتساوية داخل مساحتها الصغيرة باليسار */
        .images-grid {
            display: flex;
            gap: 15px; /* مسافة متناسقة بين الصور لمنع تداخلها */
            width: 100%;
        }
        .ai-card {
            flex: 1;
            height: 180px; /* طول متناسب ومتناسق مع العرض الجديد */
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }
        .ai-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        /* ميزة الإشعاع والتوهج المضيء المفضلة لديك */
        .ai-card:hover {
            transform: translateY(-5px);
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }
        .ai-card:hover img {
            transform: scale(1.1);
        }
        @media (max-width: 768px) {
            .gallery-box { width: 100%; padding: 20px; }
            .images-grid { flex-direction: column; gap: 15px; }
            .ai-card { height: 160px; width: 100%; }
            .gallery-box h2 { font-size: 24px; }
            .contaner { height: auto; padding-bottom: 30px; }
        }
    </style>
</head>
<body>
     <div class="contaner">
        <header>
            <a class="logo" href="index.html">avatar</a>
            <ul>
                <li><a href="index.html">home</a></li>
                <li><a href="clans.html">clans</a></li> 
                <li><a href="video.html" style="color: rgb(10, 218, 10);">video</a></li>
                <li><a href="phone.html">phone</a></li>
                <li><a href="about.html">about</a></li>
            </ul>
        </header>
        
        <div class="gallery-box">
            <h2>AI Pandora World</h2>
            <div class="images-grid">
                
                <div class="ai-card">
                    <img src="./pic1.jpg.jpg" alt="Pandora Nature">
                </div>
                
                <div class="ai-card">
                    <img src="./pic2.jpg.jpg" alt="Pandora Creature">
                </div>
                
                <div class="ai-card">
                    <img src="./pic3.jpg.jpg" alt="Avatar Character">
                </div>
                
            </div>
        </div>
     </div>
</body>
</html>
