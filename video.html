        <style>
            .video-grid {
                display: flex;
                justify-content: center;
                gap: 20px;
                flex-wrap: wrap;
                margin-top: 10px;
                padding: 0 40px;
                max-height: 400px;
                overflow-y: auto;
            }
            .video-card {
                width: 45%;
                background: rgba(255, 255, 255, 0.05);
                padding: 10px;
                border-radius: 8px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            }
            video {
                width: 100%;
                height: 140px;
                border-radius: 6px;
                background: #000;
            }
            .video-card h3 {
                color: #fff;
                font-size: 14px;
                margin-top: 5px;
                font-family: 'Poppins', sans-serif;
                text-align: center;
            }
            .video-grid::-webkit-scrollbar {
                width: 6px;
            }
            .video-grid::-webkit-scrollbar-thumb {
                background: rgb(10, 218, 10);
                border-radius: 10px;
            }
            @media (max-width: 768px) {
                .video-card { width: 100%; }
                .contaner { height: auto; padding-bottom: 20px; }
                .video-grid { max-height: none; }
            }
        </style>
    </head>
