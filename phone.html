<!DOCTYPE html>
<html>
<head>
    <title>Avatar - Contact Us</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="./man.css"> 
    <style>
    
        .contact-box {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 40px;
        }
        .contact-box h2 {
            font-family: 'Cinzel', serif;
            color: #fff;
            font-size: 32px;
            margin-bottom: 15px;
            text-align: center;
        }
        .input-field {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #00d2ff;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }
        textarea.input-field {
            height: 100px;
            resize: none;
        }
        .contact-box button {
            margin-top: 5px;
            width: 100%;
        }
        @media (max-width: 768px) {
            .contact-box { padding: 0 20px; }
            .contaner { height: auto; padding-bottom: 30px; }
        }
    </style>
</head>
<body>
     <div class="contaner">
        <header>
            <a class="logo" href="index.html">avatar</a>
            <ul>
                <li><a href="index.html">home</a></li>
                <li><a href="clans.html">clans</a></li> 
                <li><a href="video.html">video</a></li>
                <li><a href="phone.html" style="color: rgb(10, 218, 10);">phone</a></li>
                <li><a href="#">about</a></li>
            </ul>
        </header>
        
        
        <div class="contact-box">
            <h2>Contact Us</h2>
            <input type="text" class="input-field" placeholder="Your Name" required>
            <input type="email" class="input-field" placeholder="Your Email" required>
            <textarea class="input-field" placeholder="Your Message" required></textarea>
            <button type="submit" onclick="alert('Message Sent Successfully!')">Send Message</button>
        </div>
     </div>
</body>
</html>
